<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>RefOpen — LinkedIn Sign In</title>
  <style>
    body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0a0a23; color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; }
    .card { text-align: center; padding: 40px; }
    .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #0A66C2; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 20px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    h2 { font-size: 20px; margin: 0 0 8px; }
    p { font-size: 14px; color: #aaa; margin: 0; }
    a { color: #0A66C2; }
  </style>
</head>
<body>
  <div class="card">
    <div class="spinner"></div>
    <h2>Signing you in...</h2>
    <p id="status">Redirecting back to RefOpen</p>
  </div>
  <script>
    (function () {
      try {
        var params = new URLSearchParams(window.location.search);
        var code = params.get('code');
        var state = params.get('state');
        var error = params.get('error');

        if (error) {
          document.getElementById('status').innerHTML = 'LinkedIn sign-in was cancelled. <a href="https://www.refopen.com">Go to RefOpen</a>';
          return;
        }

        if (!code) {
          document.getElementById('status').innerHTML = 'No authorization code received. <a href="https://www.refopen.com">Go to RefOpen</a>';
          return;
        }

        // Decode state to get app scheme
        var scheme = 'com.refopen.app';
        if (state) {
          try {
            var decoded = atob(state.replace(/-/g, '+').replace(/_/g, '/'));
            var stateObj = JSON.parse(decoded);
            if (stateObj.scheme) scheme = stateObj.scheme;
          } catch (e) { /* use default scheme */ }
        }

        // Build deep link URL with the authorization code
        var deepLink = scheme + '://auth/linkedin-callback?code=' + encodeURIComponent(code);
        if (state) deepLink += '&state=' + encodeURIComponent(state);

        // Try to open the deep link
        window.location.href = deepLink;

        // Fallback: show manual link after 3 seconds
        setTimeout(function () {
          document.getElementById('status').innerHTML =
            'If the app didn\'t open, <a href="' + deepLink + '">tap here</a> or go to <a href="https://www.refopen.com">refopen.com</a>';
        }, 3000);
      } catch (e) {
        document.getElementById('status').innerHTML = 'Something went wrong. <a href="https://www.refopen.com">Go to RefOpen</a>';
      }
    })();
  </script>
</body>
</html>
